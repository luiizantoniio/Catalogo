<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaspi Distribuidora — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   VASPI CATÁLOGO DIGITAL v4
   Alterações: PN no card · Tags · Filtros completos · Ordem por PN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root{
  --red:#C8102E;--red-d:#a00d25;--red-l:rgba(200,16,46,.08);
  --bg:#F0F0F0;--surf:#fff;--surf2:#F5F5F5;--surf3:#EBEBEB;
  --brd:#DEDEDE;--brd2:#C0C0C0;
  --txt:#1C1C1C;--txt2:#555;--txt3:#999;
  --grn:#1a7a35;--grn-bg:#eef7f0;
  --gold:#b8860b;--gold-bg:#fef9ec;
  --blue:#0055aa;--blue-bg:#eef4ff;
  --r:5px;--sh:0 1px 3px rgba(0,0,0,.09);--sh2:0 4px 20px rgba(0,0,0,.14);
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;
  --hh:54px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:60;background:var(--red);height:var(--hh);display:flex;align-items:center;padding:0 10px;gap:8px;box-shadow:0 2px 10px rgba(0,0,0,.28)}
.logo-wrap{flex-shrink:0}
.logo{font-family:var(--fd);font-size:24px;color:#fff;letter-spacing:1px;line-height:1;display:block}
.logo-sub{font-family:var(--fb);font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,.6);text-transform:uppercase;display:block;margin-top:-1px}
.srch-wrap{flex:1;position:relative;max-width:500px;margin:0 auto}
.srch-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
#sInput{width:100%;background:#fff;border:none;border-radius:var(--r);font-family:var(--fb);font-size:13px;padding:7px 30px 7px 32px;outline:none;color:var(--txt)}
#sInput::placeholder{color:#aaa}
.s-clr{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:17px;color:#aaa;padding:2px 4px;display:none;line-height:1;border-radius:3px}
.s-clr.v{display:block}
.hdr-info{font-size:11px;color:rgba(255,255,255,.65);white-space:nowrap;flex-shrink:0;display:none}
@media(min-width:560px){.hdr-info{display:block}}

/* ── FILTER BAR ─────────────────────────────────────── */
/* Duas linhas no mobile: scrollável, sticky abaixo do header */
.fbar{
  position:sticky;top:var(--hh);z-index:50;
  background:var(--surf);border-bottom:1.5px solid var(--brd);
  display:none;flex-direction:column;
  overflow:hidden;
}
.fbar.v{display:flex}
/* Linha de chips: rolagem horizontal */
.fbar-row{
  display:flex;align-items:center;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;-ms-overflow-style:none;
  padding:6px 8px;gap:5px;white-space:nowrap;
  border-bottom:1px solid var(--brd);
  min-height:38px;
}
.fbar-row:last-child{border-bottom:none}
.fbar-row::-webkit-scrollbar{display:none}
.flabel{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--txt3);flex-shrink:0;padding-right:2px}
.fdiv{width:1px;height:18px;background:var(--brd);flex-shrink:0;margin:0 2px}
/* Chips genéricos */
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1.5px solid var(--brd);background:var(--surf);color:var(--txt2);transition:all .1s;white-space:nowrap;flex-shrink:0;cursor:pointer}
.chip:hover{border-color:var(--red);color:var(--red)}
.chip.on{background:var(--red);color:#fff;border-color:var(--red);font-weight:700}
/* Chips especiais com cor própria */
.chip-promo.on{background:var(--grn);border-color:var(--grn)}
.chip-novo.on{background:var(--blue);border-color:var(--blue)}
.chip-top.on{background:var(--gold);border-color:var(--gold)}
/* Linha de utilitários (sort + limpar) */
.fbar-util{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px;gap:8px;
}
.sort-sel{background:var(--surf2);border:1.5px solid var(--brd);border-radius:var(--r);font-family:var(--fb);font-size:11px;padding:3px 8px;color:var(--txt);outline:none;cursor:pointer}
.clr-btn{font-size:11px;font-weight:700;color:var(--red);padding:2px 8px;border-radius:var(--r);border:1.5px solid rgba(200,16,46,.4);transition:all .1s;display:none}
.clr-btn:hover{background:var(--red);color:#fff}
.clr-btn.v{display:block}

/* ── MAIN ── */
.main{max-width:1600px;margin:0 auto;padding:8px 6px 48px}
.rbar{display:none;align-items:center;padding:4px 2px 6px;font-size:12px;color:var(--txt3)}
.rbar.v{display:flex}
.rbar strong{color:var(--red)}
.welcome{text-align:center;padding:80px 20px;display:none}
.welcome.v{display:block}
.welcome h2{font-family:var(--fd);font-size:42px;color:var(--red);margin-bottom:8px}
.welcome p{color:var(--txt2);margin-bottom:20px;font-size:14px}

/* ── GRID — mobile EXATAMENTE 3 colunas ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
@media(min-width:480px){.grid{grid-template-columns:repeat(4,1fr);gap:7px}}
@media(min-width:700px){.grid{grid-template-columns:repeat(5,1fr);gap:8px}}
@media(min-width:960px){.grid{grid-template-columns:repeat(6,1fr)}}
@media(min-width:1200px){.grid{grid-template-columns:repeat(7,1fr)}}
@media(min-width:1400px){.grid{grid-template-columns:repeat(8,1fr)}}

/* ── CARD ── */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;transition:transform .14s,box-shadow .14s,border-color .14s;animation:fu .18s ease both}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-color:var(--red)}
.card:active{transform:none;box-shadow:var(--sh)}

/* Área de imagem */
.cimg{aspect-ratio:1/1;background:var(--surf2);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.cimg img{width:100%;height:100%;object-fit:contain;padding:5px;transition:opacity .25s}
.cimg img.lz{opacity:0}
.cimg img.ld{opacity:1}
.ph-img{display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--brd2)}
.ph-img svg{width:28px;height:28px;stroke:var(--brd2);stroke-width:1.2}

/* TAGS no canto superior esquerdo da imagem — empilhadas */
.card-tags{position:absolute;top:4px;left:4px;display:flex;flex-direction:column;gap:2px;z-index:2}
.tag{font-size:7px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:1px 5px;border-radius:2px;line-height:1.5;display:block}
.tag-promo{background:var(--grn);color:#fff}
.tag-novo{background:var(--blue);color:#fff}
.tag-top{background:var(--gold);color:#fff}

/* Badge de variações */
.pb-vars{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;z-index:2}

/* Corpo do card */
.cbody{padding:5px 6px 7px}
/* PN principal — destaque vermelho */
.cpn{font-family:var(--fd);font-size:13px;color:var(--red);letter-spacing:.3px;line-height:1;margin-bottom:2px}
/* Nome do produto */
.cname{font-size:11px;color:var(--txt);font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ccat{font-size:10px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── SENTINEL / EMPTY ── */
#sentinel{grid-column:1/-1;height:48px;display:flex;align-items:center;justify-content:center}
.spin{width:24px;height:24px;border:2.5px solid var(--brd);border-top-color:var(--red);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{display:none;grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--txt3)}
.empty.v{display:block}
.empty h3{font-family:var(--fd);font-size:28px;color:var(--txt2);margin-bottom:6px}

/* ── MODAL ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;place-items:center;padding:10px;backdrop-filter:blur(3px)}
.ovl.o{display:grid}
.mdl{background:var(--surf);border-radius:8px;max-width:560px;width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.3);animation:mi .16s ease}
@keyframes mi{from{transform:scale(.95);opacity:0}}
.mhd{background:var(--red);padding:14px 16px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.mthumb{width:54px;height:54px;border-radius:4px;background:rgba(255,255,255,.15);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mthumb img{width:100%;height:100%;object-fit:contain;padding:4px}
.minfo{flex:1;min-width:0}
/* Tags no modal */
.mtags{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.mtag{font-size:9px;font-weight:700;text-transform:uppercase;padding:1px 6px;border-radius:3px;letter-spacing:.4px}
.mtag-promo{background:var(--grn);color:#fff}
.mtag-novo{background:var(--blue);color:#fff}
.mtag-top{background:var(--gold);color:#fff}
.mpn-label{font-family:var(--fd);font-size:13px;color:rgba(255,255,255,.7);letter-spacing:.3px;margin-bottom:1px}
.mname{font-family:var(--fd);font-size:22px;color:#fff;letter-spacing:.3px;line-height:1.15}
.mmeta{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}
.mclose{color:rgba(255,255,255,.7);padding:3px;flex-shrink:0;border-radius:3px;margin-top:-2px;transition:color .1s}
.mclose:hover{color:#fff}
.mbody{overflow-y:auto;flex:1}
.m-bloco{border-bottom:1px solid var(--brd)}
.m-bloco:last-child{border-bottom:none}
.m-titulo{padding:7px 14px;background:var(--surf2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:1}
.m-titulo .mc{font-size:10px;font-weight:400;color:var(--txt3);background:var(--surf3);padding:1px 6px;border-radius:10px}
.v-row{display:flex;align-items:stretch;border-bottom:1px solid var(--brd)}
.v-row:last-child{border-bottom:none}
.v-pn{font-family:var(--fd);font-size:14px;color:var(--red);letter-spacing:.2px;padding:8px 12px;flex-shrink:0;min-width:90px;border-right:1px solid var(--brd);background:rgba(200,16,46,.03);display:flex;align-items:center}
.v-info{padding:8px 12px;flex:1;display:flex;flex-direction:column;justify-content:center}
.v-var{font-size:12px;color:var(--txt);font-weight:500;line-height:1.3}
.v-promo{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--grn);border:1px solid rgba(26,122,53,.3);padding:1px 5px;border-radius:3px;background:var(--grn-bg);margin-top:2px}
.mfot{padding:10px 14px;border-top:1px solid var(--brd);display:flex;gap:7px;flex-shrink:0}
.btn-wa{display:flex;align-items:center;gap:6px;background:#25d366;color:#fff;font-family:var(--fb);font-weight:700;font-size:12px;padding:8px 14px;border-radius:var(--r);border:none;cursor:pointer;text-decoration:none;transition:filter .12s}
.btn-wa:hover{filter:brightness(1.08)}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo-wrap">
    <span class="logo">VASPI</span>
    <span class="logo-sub">Distribuidora</span>
  </div>
  <div class="srch-wrap">
    <svg class="srch-icon" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="sInput" type="search" placeholder="Buscar produto, modelo, variação, PN…" autocomplete="off" spellcheck="false">
    <button class="s-clr" id="sClear">×</button>

<!-- FILTER BAR: duas linhas -->
<div class="fbar" id="fbar">

    <div id="catChips" style="display:flex;gap:4px;flex-shrink:0"></div>

    <span class="flabel">Linha</span>
    <div id="lineChips" style="display:flex;gap:4px;flex-shrink:0"></div>
  </div>

  <div class="fbar-row">

    <button class="chip chip-novo" id="novoChip">✨ Novidades</button>
    <button class="chip chip-top" id="topChip">⭐ Mais Vendidos</button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0">
      <select class="sort-sel" id="sortSel">
        <option value="pn">Ordem por Referência</option>
        <option value="alpha">A–Z</option>
      </select>
      <button class="clr-btn" id="clrBtn">✕ Limpar filtros</button>

</div>

<main class="main">
  <div class="rbar" id="rbar">

  </div>
  <div class="welcome" id="welcome">
    <h2>Catálogo Vaspi</h2>
    <p>Nenhum produto carregado ainda.<br>Acesse o painel de gestão para importar o catálogo.</p>
  </div>
  <div class="grid" id="grid">
    <div class="empty" id="emptyEl"><h3>Sem resultados</h3><p>Tente outros termos ou limpe os filtros.</p></div>
    <div id="sentinel"></div>
  </div>
</main>

<!-- MODAL -->
<div class="ovl" id="ovl" role="dialog" aria-modal="true">
  <div class="mdl">
    <div class="mhd">
      <div class="mthumb" id="mThumb"></div>
      <div class="minfo">
        <div class="mtags" id="mTags"></div>
        <div class="mpn-label" id="mPNLabel"></div>
        <div class="mname" id="mName"></div>
        <div class="mmeta" id="mMeta"></div>
      </div>
      <button class="mclose" id="mClose" aria-label="Fechar">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="mbody" id="mBody"></div>
    <div class="mfot">
      <a id="btnWA" class="btn-wa" href="#" target="_blank" rel="noopener">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2.049 22l4.98-1.363A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
        Solicitar Orçamento
      </a>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   VASPI CATÁLOGO DIGITAL v4
   catalogo-digital.html | Público | Sem backend

   MODELO DE DADOS (cada item no localStorage):
     produto_base — nome no grid, chave de agrupamento
     modelo       — sub-agrupamento dentro do modal
     variacao     — detalhe da linha (cor, tamanho, tensão…)
     pn           — Part Number único
     categoria    — filtro
     linha        — filtro
     promocao     — "sim" / vazio
     tag_novo     — "sim" / vazio  (Novidade)
     tag_top      — "sim" / vazio  (Mais Vendido)

   GRID: ordenado por PN principal (primeiro PN do grupo), crescente
   CARD: mostra PN principal + nome do produto_base + tags
   MODAL: Modelo → PN | Variação
════════════════════════════════════════════════════════ */

const CFG = {
  IMG_BASE: '',           // ex: 'https://vaspi.com.br/imgs/'
  IMG_EXT:  '.jpg',       // nome = slug(produto_base) + ext
  WA_NUM:   '5528999559195',
  PAGE:     48,
  DEB:      260,
};

const S = {
  groups: [], visible: [], rendered: 0,
  ioScroll: null, ioImg: null,
  // filtros
  f: {
    cats:  new Set(),
    lines: new Set(),
    promo: false,
    novo:  false,
    top:   false,
  },
  sort: 'pn',   // 'pn' | 'alpha'
  q:    '',
};

// ── Carregamento de dados ─────────────────────────────
// 1. Tenta buscar produtos.json (GitHub Pages — fonte oficial)
// 2. Fallback para localStorage (dev local / mesmo navegador que o admin)
async function loadDB() {
  try {
    const res = await fetch('produtos.json?v=' + Date.now(), { cache: 'no-cache' });
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data) && data.length > 0) return { items: data };
    }
  } catch (_) {}
  try { return { items: JSON.parse(localStorage.getItem('vaspi_products') || '[]') }; }
  catch { return { items: [] }; }
}

// ── Helpers de tag ────────────────────────────────────
const isPromo = i => String(i.promocao||'').toLowerCase().startsWith('s');
const isNovo  = i => String(i.tag_novo||'').toLowerCase().startsWith('s');
const isTop   = i => String(i.tag_top||'').toLowerCase().startsWith('s');

// ── Agrupamento por produto_base ──────────────────────
// Um grupo = um card. O PN principal do grupo = menor PN (ordem numérica).
function buildGroups(items) {
  if (!items.length) return [];
  const map = {};

  items.forEach(item => {
    const base = String(item.produto_base || '').trim();
    if (!base) return;

    if (!map[base]) {
      map[base] = {
        id: base, name: base,
        cat: '', line: '',
        // tags do grupo: true se QUALQUER item tiver
        promo: false, novo: false, top: false,
        // PN principal (menor PN do grupo, para ordenação e exibição)
        mainPn: '',
        modelos: {},    // { nomeModelo: [item, …] }
        totalItems: 0,
      };
    }
    const g = map[base];
    if (!g.cat  && item.categoria) g.cat  = item.categoria;
    if (!g.line && item.linha)     g.line = item.linha;
    if (isPromo(item)) g.promo = true;
    if (isNovo(item))  g.novo  = true;
    if (isTop(item))   g.top   = true;

    const mod = String(item.modelo || '').trim();
    if (!g.modelos[mod]) g.modelos[mod] = [];
    g.modelos[mod].push(item);
    g.totalItems++;
  });

  const all = Object.values(map);

  // Ordenar variações dentro de cada modelo por PN (numérico)
  all.forEach(g => {
    Object.values(g.modelos).forEach(arr =>
      arr.sort((a,b) => String(a.pn||'').localeCompare(String(b.pn||''), undefined, {numeric:true}))
    );
    // PN principal = primeiro PN de todos os itens do grupo
    const allPns = Object.values(g.modelos).flat().map(i=>i.pn||'').filter(Boolean);
    allPns.sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
    g.mainPn = allPns[0] || '';
  });

  return all;
}

// ── Slug para imagem ──────────────────────────────────
const slug = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

// ── Filtros & busca ───────────────────────────────────
function applyAll() {
  const { f, sort, q } = S;
  let res = S.groups;

  if (f.cats.size)  res = res.filter(g => f.cats.has(g.cat));
  if (f.lines.size) res = res.filter(g => f.lines.has(g.line));
  if (f.promo)      res = res.filter(g => g.promo);
  if (f.novo)       res = res.filter(g => g.novo);
  if (f.top)        res = res.filter(g => g.top);

  if (q) {
    res = res.filter(g => {
      const parts = [g.name, g.mainPn];
      Object.entries(g.modelos).forEach(([mod, its]) => {
        if (mod) parts.push(mod);
        its.forEach(i => { parts.push(i.variacao||''); parts.push(i.pn||''); });
      });
      return fuzzy(parts.join(' '), q);
    });
  }

  // Ordenação
  res = [...res].sort((a,b) => {
    if (sort === 'alpha') return a.name.localeCompare(b.name, 'pt');
    // Padrão: por PN principal, crescente (numérico)
    return a.mainPn.localeCompare(b.mainPn, undefined, {numeric:true});
  });

  S.visible = res;
  rerender();
}

function fuzzy(text, q) {
  const t=norm(text), s=norm(q);
  if (t.includes(s)) return true;
  if (s.length>=4) for(let i=0;i<s.length;i++) if(t.includes(s.slice(0,i)+s.slice(i+1))) return true;
  return false;
}
const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

// ── Render grid ───────────────────────────────────────
function rerender() {
  const grid = document.getElementById('grid');
  grid.querySelectorAll('.card').forEach(c=>c.remove());
  S.rendered = 0;
  const v = S.visible.length;
  document.getElementById('vCnt').textContent = v;
  document.getElementById('tCnt').textContent = S.groups.length;
  document.getElementById('hInfo').textContent = v + ' itens';
  document.getElementById('emptyEl').classList.toggle('v', v===0);
  renderBatch();
}

function renderBatch() {
  const grid = document.getElementById('grid');
  const sent = document.getElementById('sentinel');
  const end  = Math.min(S.rendered + CFG.PAGE, S.visible.length);
  const frag = document.createDocumentFragment();
  for (let i=S.rendered; i<end; i++) frag.appendChild(makeCard(S.visible[i], i));
  grid.insertBefore(frag, sent);
  S.rendered = end;
  sent.innerHTML = S.rendered < S.visible.length ? '<div class="spin"></div>' : '';
}

function makeCard(g, idx) {
  const el  = document.createElement('div');
  el.className = 'card';
  el.style.animationDelay = Math.min((idx % CFG.PAGE)*16, 380)+'ms';

  const src = CFG.IMG_BASE ? `${CFG.IMG_BASE}${slug(g.name)}${CFG.IMG_EXT}` : null;
  const tv  = g.totalItems;

  // Montar tags
  const tagsHTML = [
    g.promo ? '<span class="tag tag-promo">Promoção</span>' : '',
    g.novo  ? '<span class="tag tag-novo">Novidade</span>'  : '',
    g.top   ? '<span class="tag tag-top">Mais Vendido</span>' : '',
  ].filter(Boolean).join('');

  el.innerHTML = `
    <div class="cimg">
      ${src ? `<img class="lz" data-src="${src}" alt="${esc(g.name)}" width="300" height="300">` : phH()}
      ${tagsHTML ? `<div class="card-tags">${tagsHTML}</div>` : ''}
      ${tv > 1 ? `<span class="pb-vars">${tv}</span>` : ''}
    </div>
    <div class="cbody">
      <div class="cpn">${g.mainPn}</div>
      <div class="cname">${g.name}</div>
      ${g.cat ? `<div class="ccat">${g.cat}</div>` : ''}
    </div>`;

  const img = el.querySelector('img.lz');
  if (img && S.ioImg) {
    S.ioImg.observe(img);
    img.addEventListener('load', ()=>img.classList.replace('lz','ld'));
    img.addEventListener('error', ()=>img.replaceWith(phEl()));
  }
  el.addEventListener('click', ()=>openModal(g));
  return el;
}

// ── Modal ─────────────────────────────────────────────
function openModal(g) {
  // Tags no modal
  const tagsEl = document.getElementById('mTags');
  tagsEl.innerHTML = [
    g.promo ? '<span class="mtag mtag-promo">🔥 Promoção</span>'     : '',
    g.novo  ? '<span class="mtag mtag-novo">✨ Novidade</span>'       : '',
    g.top   ? '<span class="mtag mtag-top">⭐ Mais Vendido</span>'   : '',
  ].filter(Boolean).join('');

  document.getElementById('mPNLabel').textContent = g.mainPn ? 'Ref. ' + g.mainPn : '';
  document.getElementById('mName').textContent = g.name;
  document.getElementById('mMeta').textContent =
    [g.cat, g.line].filter(Boolean).join(' · ') +
    (g.totalItems > 1 ? ` · ${g.totalItems} variações` : '');

  const th = document.getElementById('mThumb');
  th.innerHTML = CFG.IMG_BASE
    ? `<img src="${CFG.IMG_BASE}${slug(g.name)}${CFG.IMG_EXT}" alt="${esc(g.name)}" onerror="this.parentElement.innerHTML=''">`
    : '';

  // Corpo: Modelo → PN | Variação
  const mKeys = Object.keys(g.modelos).sort((a,b)=>{
    if (!a && !b) return 0; if (!a) return -1; if (!b) return 1;
    return a.localeCompare(b,'pt');
  });

  document.getElementById('mBody').innerHTML = mKeys.map(mod => {
    const items = g.modelos[mod];
    const hasM  = mod.trim() !== '';
    const rows  = items.map(item => `
      <div class="v-row">
        <div class="v-pn">${item.pn||'—'}</div>
        <div class="v-info">
          ${item.variacao ? `<div class="v-var">${item.variacao}</div>` : ''}
          ${isPromo(item) ? '<span class="v-promo">Promoção</span>' : ''}
        </div>
      </div>`).join('');
    return `<div class="m-bloco">
      ${hasM ? `<div class="m-titulo">${mod}<span class="mc">${items.length}</span></div>` : ''}
      ${rows}
    </div>`;
  }).join('');

  // WhatsApp
  const waParts = [`Olá! Gostaria de orçamento:\n*${g.name}* (Ref. ${g.mainPn})`];
  mKeys.forEach(mod => {
    if (mod) waParts.push(`\n_${mod}_`);
    g.modelos[mod].forEach(i => {
      waParts.push(`• ${[i.pn, i.variacao].filter(Boolean).join(' — ')}`);
    });
  });
  document.getElementById('btnWA').href =
    `https://wa.me/${CFG.WA_NUM}?text=${encodeURIComponent(waParts.join('\n'))}`;

  document.getElementById('ovl').classList.add('o');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('ovl').classList.remove('o');
  document.body.style.overflow = '';
}

// ── Filter UI ─────────────────────────────────────────
function buildFilterUI() {
  const cats  = [...new Set(S.groups.map(g=>g.cat).filter(Boolean))].sort();
  const lines = [...new Set(S.groups.map(g=>g.line).filter(Boolean))].sort();
  document.getElementById('catChips').innerHTML  = cats.map(c=>`<button class="chip" data-t="cat"  data-v="${esc(c)}">${c}</button>`).join('');
  document.getElementById('lineChips').innerHTML = lines.map(l=>`<button class="chip" data-t="line" data-v="${esc(l)}">${l}</button>`).join('');
  if (cats.length || lines.length || true) {
    document.getElementById('fbar').classList.add('v');
    document.getElementById('rbar').classList.add('v');
  }
  syncUI();
}
function syncUI() {
  document.querySelectorAll('[data-t="cat"]').forEach(b=>b.classList.toggle('on',S.f.cats.has(b.dataset.v)));
  document.querySelectorAll('[data-t="line"]').forEach(b=>b.classList.toggle('on',S.f.lines.has(b.dataset.v)));
  document.getElementById('promoChip').classList.toggle('on', S.f.promo);
  document.getElementById('novoChip').classList.toggle('on',  S.f.novo);
  document.getElementById('topChip').classList.toggle('on',   S.f.top);
  const hasFilter = S.f.cats.size||S.f.lines.size||S.f.promo||S.f.novo||S.f.top||S.q;
  document.getElementById('clrBtn').classList.toggle('v', !!hasFilter);
}

// ── URL state ─────────────────────────────────────────
function readURL() {
  const p = new URLSearchParams(location.search);
  S.q          = p.get('q')     || '';
  S.f.cats     = new Set(p.getAll('cat'));
  S.f.lines    = new Set(p.getAll('line'));
  S.f.promo    = p.get('promo') === '1';
  S.f.novo     = p.get('novo')  === '1';
  S.f.top      = p.get('top')   === '1';
  S.sort       = p.get('sort')  || 'pn';
  document.getElementById('sInput').value   = S.q;
  document.getElementById('sortSel').value  = S.sort;
  if (S.q) document.getElementById('sClear').classList.add('v');
}
function pushURL() {
  const p = new URLSearchParams();
  if (S.q)         p.set('q', S.q);
  S.f.cats.forEach(c  => p.append('cat', c));
  S.f.lines.forEach(l => p.append('line', l));
  if (S.f.promo)   p.set('promo','1');
  if (S.f.novo)    p.set('novo','1');
  if (S.f.top)     p.set('top','1');
  if (S.sort!=='pn') p.set('sort', S.sort);
  const str = p.toString();
  history.replaceState(null,'', str ? '?'+str : location.pathname);
}

// ── Observers ─────────────────────────────────────────
function setupObservers() {
  S.ioImg = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){const img=e.target;img.src=img.dataset.src;S.ioImg.unobserve(img);} });
  },{rootMargin:'300px'});
  S.ioScroll = new IntersectionObserver(es=>{
    if(es[0].isIntersecting && S.rendered < S.visible.length) renderBatch();
  },{rootMargin:'400px'});
  S.ioScroll.observe(document.getElementById('sentinel'));
}

// ── Helpers ───────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const phH = () => `<div class="ph-img"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
function phEl(){const d=document.createElement('div');d.className='ph-img';d.innerHTML=`<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="28" height="28"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;return d;}
const deb = (fn,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);}};

// ── Init ──────────────────────────────────────────────
async function init() {
  // Mostrar loading enquanto busca os dados
  document.getElementById('welcome').innerHTML = `
    <h2>Catálogo Vaspi</h2>
    <p style="color:var(--txt3)">Carregando produtos…</p>`;
  document.getElementById('welcome').classList.add('v');

  const { items } = await loadDB();

  if (!items.length) {
    document.getElementById('welcome').innerHTML = `
      <h2>Catálogo Vaspi</h2>
      <p>Nenhum produto disponível no momento.</p>`;
    return;
  }

  document.getElementById('welcome').style.display='none';
  S.groups = buildGroups(items);
  document.getElementById('tCnt').textContent = S.groups.length;
  setupObservers();
  readURL(); buildFilterUI(); syncUI(); applyAll();

  // Busca
  const dS = deb(v=>{S.q=v.trim();pushURL();syncUI();applyAll();},CFG.DEB);
  document.getElementById('sInput').addEventListener('input',e=>{
    document.getElementById('sClear').classList.toggle('v',!!e.target.value);
    dS(e.target.value);
  });
  document.getElementById('sClear').addEventListener('click',()=>{
    document.getElementById('sInput').value='';
    document.getElementById('sClear').classList.remove('v');
    S.q=''; pushURL(); syncUI(); applyAll();
  });

  // Filtros (delegação no fbar completo)
  document.getElementById('fbar').addEventListener('click',e=>{
    const btn = e.target.closest('[data-t],#promoChip,#novoChip,#topChip,#clrBtn');
    if (!btn) return;

    if (btn.id==='clrBtn') {
      S.f.cats.clear(); S.f.lines.clear();
      S.f.promo=false; S.f.novo=false; S.f.top=false;
      S.q=''; document.getElementById('sInput').value='';
      document.getElementById('sClear').classList.remove('v');
      syncUI(); pushURL(); applyAll(); return;
    }
    if (btn.id==='promoChip') { S.f.promo=!S.f.promo; syncUI(); pushURL(); applyAll(); return; }
    if (btn.id==='novoChip')  { S.f.novo =!S.f.novo;  syncUI(); pushURL(); applyAll(); return; }
    if (btn.id==='topChip')   { S.f.top  =!S.f.top;   syncUI(); pushURL(); applyAll(); return; }

    const {t,v} = btn.dataset;
    const set = t==='cat' ? S.f.cats : S.f.lines;
    set.has(v) ? set.delete(v) : set.add(v);
    syncUI(); pushURL(); applyAll();
  });

  // Sort
  document.getElementById('sortSel').addEventListener('change',e=>{
    S.sort=e.target.value; pushURL(); applyAll();
  });

  // Modal
  document.getElementById('mClose').addEventListener('click',closeModal);
  document.getElementById('ovl').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
}

document.addEventListener('DOMContentLoaded',init);
</script>
